      What steps would you take?
    expected: "check if peer-reviewed studies exist, search PubMed for clinical trials, evaluate sample sizes and methodology, check for replication by independent labs, identify funding sources and conflicts of interest, consult expert consensus and systematic reviews, check regulatory agency positions FDA EMA, assess strength of evidence"
    skill: multi_step_planning
    domain: web_research
    scoring_method: f1
    scoring_config:
      threshold: 0.5

  # ═══════════════════════════════════════════════════════════════════════
  # FORMAT TRANSFORMATION — Code Domain
  # ═══════════════════════════════════════════════════════════════════════

  - id: st_fmt_code_001
    prompt: |
      Convert this CSV data to JSON array format:

      name,age,city
      Alice,30,Portland
      Bob,25,Seattle
      Carol,35,Denver

      Return valid JSON.
    expected: '[{"name": "Alice", "age": 30, "city": "Portland"}, {"name": "Bob", "age": 25, "city": "Seattle"}, {"name": "Carol", "age": 35, "city": "Denver"}]'
    skill: format_transformation
    domain: code
    scoring_method: f1
    scoring_config:
      threshold: 0.5

  - id: st_fmt_code_002
    prompt: |
      Convert this Python dictionary to a YAML configuration:

      config = {
          "server": {"host": "0.0.0.0", "port": 8080},
          "database": {"url": "postgresql://localhost/mydb", "pool_size": 5},
          "logging": {"level": "INFO", "file": "/var/log/app.log"}
      }

      Return valid YAML.
    expected: "server:\n  host: 0.0.0.0\n  port: 8080\ndatabase:\n  url: postgresql://localhost/mydb\n  pool_size: 5\nlogging:\n  level: INFO\n  file: /var/log/app.log"
    skill: format_transformation
    domain: code
    scoring_method: f1
    scoring_config:
      threshold: 0.5

  - id: st_fmt_code_003
    prompt: |
      Convert this SQL CREATE TABLE statement to a Python SQLAlchemy model class name and column definitions:

      CREATE TABLE employees (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          email VARCHAR(255) UNIQUE,
          salary DECIMAL(10,2),
          hired_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      List the class name and each column with its SQLAlchemy type.
    expected: "Employee, id Integer primary_key, name String(100) nullable=False, email String(255) unique=True, salary Numeric(10,2), hired_at DateTime default"
    skill: format_transformation
    domain: code
    scoring_method: f1
    scoring_config:
      threshold: 0.5

